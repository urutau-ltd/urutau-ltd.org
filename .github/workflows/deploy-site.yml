---
name: Lume Deploy

on:
    push:
        branches: ["main"]

permissions:
    contents: read
    pages: write
    id-token: write
    attestations: write

concurrency:
    group: "pages"
    cancel-in-progress: false

defaults:
    run:
        shell: bash

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Configure Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Setup Pages
              id: pages
              uses: actions/configure-pages@v5

            - name: Build site
              run: make build

            - name: Upload artifacts
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./output

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                  subject-path: "./output"

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
...
