---
name: Deno CI

on:
    push:
        branches: ["main"]

permissions:
    contents: read

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Configure Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Verify code quality
              run: make ci
...
